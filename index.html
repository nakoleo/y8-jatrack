
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jatrack</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon / App Icons -->
    <link rel="icon" type="image/png" href="/icon-512.png">
    <link rel="apple-touch-icon" href="/icon-512.png">

    <!-- iOS PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Jatrack">
    <meta name="theme-color" content="#FDFAF7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="KPI Tracker — Y8 Young Age · PV">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
          --accent: #F4823C;
          --accent2: #F5A855;
          --accent-pink: #E87AA5;
          --bg: #FDFAF7;
          --dark: #2C2A28;
          --card: #FFFFFF;
        }
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            font-family: 'Prompt', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        .py-safe {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        * { scrollbar-width: none; }
        .overflow-y-auto { -webkit-overflow-scrolling: touch; }
        input, select, textarea, button {
            -webkit-appearance: none;
            outline: none;
        }
        /* Warm gradient header */
        .header-gradient {
            background: linear-gradient(160deg, #FDF1E8 0%, #F9EBE0 50%, #F5E4D8 100%);
        }
        /* Nav gradient */
        .nav-gradient {
            background: linear-gradient(to bottom, rgba(253,250,247,0.98), rgba(250,245,240,0.98));
        }
        /* Orange glow */
        .glow-orange {
            box-shadow: 0 4px 24px rgba(244,130,60,0.25);
        }
        /* Animations */
        @keyframes slide-in-from-top-4 {
            from { transform: translateX(-50%) translateY(-1rem); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        @keyframes slide-in-from-bottom {
            from { transform: translateY(1.5rem); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @keyframes slide-in-from-bottom-2 {
            from { transform: translateY(0.5rem); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes zoom-in {
            from { transform: scale(0.94); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.6; }
        }
        .animate-in { animation-fill-mode: both; }
        .fade-in { animation-name: fade-in; }
        .zoom-in { animation-name: zoom-in; }
        .slide-in-from-top-4 { animation-name: slide-in-from-top-4; }
        .slide-in-from-bottom { animation-name: slide-in-from-bottom; }
        .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
        .duration-200 { animation-duration: 200ms; }
        .duration-300 { animation-duration: 300ms; }
        .duration-400 { animation-duration: 400ms; }
        .duration-500 { animation-duration: 500ms; }
        .pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
        /* Smooth progress bar */
        .progress-bar { transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
        /* Floating icon animation — parallax feel */
        @keyframes float-icon {
            0%, 100% { transform: translateY(0px)   rotate(0deg); }
            30%       { transform: translateY(-10px) rotate(0.7deg); }
            70%       { transform: translateY(-6px)  rotate(-0.5deg); }
        }
        @keyframes shadow-breathe {
            0%, 100% { transform: translateX(-50%) scale(1);    opacity: 0.20; }
            50%       { transform: translateX(-50%) scale(0.76); opacity: 0.07; }
        }
        @keyframes glow-breathe {
            0%, 100% { opacity: 0.28; transform: scale(1); }
            50%       { opacity: 0.10; transform: scale(0.86); }
        }
        .animate-float  { animation: float-icon     4.2s ease-in-out infinite; }
        .animate-shadow { animation: shadow-breathe 4.2s ease-in-out infinite; }
        .animate-glow   { animation: glow-breathe   4.2s ease-in-out infinite; }
    </style>
<script type="importmap">

}

</html>
